<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- clouderby logo - simple 3D cube, monotone matching UI theme -->

  <g transform="translate(50,50)">
    <!-- Left face -->
    <polygon points="-32,0 0,18 0,-18 -32,-36" fill="#3d5a80"/>
    <!-- Right face -->
    <polygon points="32,0 0,18 0,-18 32,-36" fill="#2a3f5f"/>
    <!-- Top face -->
    <polygon points="0,-18 -32,-36 0,-54 32,-36" fill="#5c7599"/>

    <!-- Edges -->
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#a0b4d4" stroke-width="2"/>
    <line x1="0" y1="-18" x2="-32" y2="-36" stroke="#a0b4d4" stroke-width="2"/>
    <line x1="0" y1="-18" x2="32" y2="-36" stroke="#a0b4d4" stroke-width="2"/>
  </g>
</svg>
